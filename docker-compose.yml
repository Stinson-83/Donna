services:
  postgres:
    image: postgres:16-alpine
    container_name: donna-postgres
    environment:
      POSTGRES_USER: donna
      POSTGRES_PASSWORD: donna
      POSTGRES_DB: donna
    ports:
      - "5432:5432"
    volumes:
      - donna_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donna -d donna"]
      interval: 3s
      timeout: 3s
      retries: 10

  falkordb:
    image: falkordb/falkordb:latest
    container_name: donna-falkordb
    ports:
      - "6379:6379"
    volumes:
      - donna_falkor:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  donna_pg:
  donna_falkor:
